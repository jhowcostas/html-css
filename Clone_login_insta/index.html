<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/favicon.png">
</head>

<body>
    <main id="main-container">
        <!-- Banner Container -->
        <div id="banner-container">
            <img src="img/banner2.png" alt="Crie uma conta no Instagram">
        </div>
        <!-- Login -->
        <div class="form-container">
            <div class="form-box">
                <img id="logo-insta" src="img/logo_instagram.png" alt="Instagram">
                <form id="login-form">
                    <input type="text" name="username" placeholder="Número de telefone, usuário ou e-mail">
                    <input type="password" value="password" placeholder="Senha">
                    <input type="submit" value="Entrar">
                </form>
                <div class="separator">
                    <div class="line"></div>
                    <span>Ou</span>
                </div>
                <div class="other-links">
                    <div class="facebook-login">
                        <a href="#">
                            <img src="img/logo_facebook.png" alt="Facebook login">
                            <span>Entrar no facebook</span>
                        </a>
                    </div>
                    <div class="forgot-pass">
                        <a href="#">Esqueceu a senha?</a>
                    </div>
                    <div class="register-container">
                        <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
                    </div>
                    <div class="get-app-container">
                        <p>Obtenha o aplicativo</p>
                        <a href="#">
                            <img src="img/apple_btn.png" alt="Apple store">
                        </a>
                        <a href="#">
                            <img src="img/gplay_btn.png" alt="Google play">
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <footer>
        <nav>
            <ul id="footer-links">
                <li><a href="#">Meta</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Ajuda</a></li>
                <li><a href="#">API</a></li>
                <li><a href="#">Privacidade</a></li>
                <li><a href="#">Termos</a></li>
                <li><a href="#">Principais Contas</a></li>
                <li><a href="#">hashtags</a></li>
                <li><a href="#">Localização</a></li>
                <li><a href="#">Instagram Lite</a></li>
            </ul>
        </nav>
        <p id="copy-right">&copy; 2026 Instagram from Meta</p>
    </footer>
</body>

</html>
